<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manejo del sistema de filtración</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Maps para React y Lucide -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white text-slate-900 font-sans antialiased w-full h-auto p-4 md:p-8">
    <div id="root" class="max-w-3xl mx-auto"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            CheckCircle2, 
            Circle, 
            ArrowLeft, 
            Droplets, 
            RefreshCw, 
            Filter, 
            Waves, 
            Trash2, 
            Download,
            AlertCircle,
            Check
        } from 'lucide-react';

        // Base de datos de los procesos
        const PROCESSES = [
            {
                id: 'aspiracion-filtrando',
                name: 'ASPIRACIÓN FILTRANDO',
                icon: Droplets,
                steps: [
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Abrir las válvulas requeridas', value: 'Toma de succión, inyectores' },
                    { title: 'Cerrar las válvulas requeridas', value: 'Desnatador, drenaje sumergido, desagüe' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Filter' },
                    { title: 'Estado del motor', value: 'Prender el motor' }
                ]
            },
            {
                id: 'recirculacion',
                name: 'RECIRCULACIÓN',
                icon: RefreshCw,
                steps: [
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Abrir las válvulas requeridas', value: 'Desnatador, drenaje sumergido, inyectores' },
                    { title: 'Cerrar las válvulas requeridas', value: 'Toma de succión, desagüe' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Recirculate' },
                    { title: 'Estado del motor', value: 'Prender el motor' }
                ]
            },
            {
                id: 'filtracion',
                name: 'FILTRACIÓN',
                icon: Filter,
                steps: [
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Abrir las válvulas requeridas', value: 'Desnatador, drenaje sumergido, inyectores' },
                    { title: 'Cerrar las válvulas requeridas', value: 'Toma de succión, desagüe' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Filter' },
                    { title: 'Estado del motor', value: 'Prender el motor' }
                ]
            },
            {
                id: 'lavado-filtro',
                name: 'LAVADO DEL FILTRO',
                icon: Waves,
                steps: [
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Abrir las válvulas requeridas', value: 'Drenaje sumergido, toma de succión, desagüe' },
                    { title: 'Cerrar las válvulas requeridas', value: 'Desnatador, inyectores' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Backwash' },
                    { title: 'Estado del motor', value: 'Encendido (tiempo según el visor)' },
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Rinse (tiempo según el visor)' },
                    { title: 'Estado del motor', value: 'Prender el motor' }
                ]
            },
            {
                id: 'aspiracion-botando',
                name: 'ASPIRACIÓN BOTANDO A LA CAÑERIA',
                icon: Trash2,
                steps: [
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Abrir las válvulas requeridas', value: 'Toma de succión, desagüe' },
                    { title: 'Cerrar las válvulas requeridas', value: 'Desnatador, drenaje sumergido, inyectores' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Waste' },
                    { title: 'Estado del motor', value: 'Prender el motor' }
                ]
            },
            {
                id: 'vaciado',
                name: 'VACIADO',
                icon: Download,
                steps: [
                    { title: 'Verificar que el motor esté', value: 'Apagado' },
                    { title: 'Abrir las válvulas requeridas', value: 'Drenaje sumergido, desagüe' },
                    { title: 'Cerrar las válvulas requeridas', value: 'Desnatador, toma de succión, inyectores' },
                    { title: 'Seleccionar la función en la llave selectora', value: 'Waste' },
                    { title: 'Estado del motor', value: 'Prender el motor' }
                ]
            }
        ];

        function App() {
            const [activeProcessId, setActiveProcessId] = useState(() => localStorage.getItem('pool_activeProcess') || null);
            const [showResult, setShowResult] = useState(false);
            const [validationError, setValidationError] = useState(false);
            
            const [completedSteps, setCompletedSteps] = useState(() => {
                const saved = localStorage.getItem('pool_completedSteps');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => {
                if (activeProcessId) localStorage.setItem('pool_activeProcess', activeProcessId);
                else localStorage.removeItem('pool_activeProcess');
                localStorage.setItem('pool_completedSteps', JSON.stringify(completedSteps));
            }, [activeProcessId, completedSteps]);

            const activeProcess = PROCESSES.find(p => p.id === activeProcessId);

            const handleSelectProcess = (id) => {
                setActiveProcessId(id);
                setShowResult(false);
                setValidationError(false);
                if (!completedSteps[id]) {
                    setCompletedSteps(prev => ({ ...prev, [id]: [] }));
                }
            };

            const handleToggleStep = (stepIndex) => {
                if (!activeProcessId) return;
                setValidationError(false);
                setShowResult(false);

                setCompletedSteps(prev => {
                    const processSteps = prev[activeProcessId] || [];
                    const isCompleted = processSteps.includes(stepIndex);
                    
                    let newProcessSteps;
                    if (isCompleted) {
                        newProcessSteps = processSteps.filter(index => index !== stepIndex);
                    } else {
                        newProcessSteps = [...processSteps, stepIndex];
                    }
                    return { ...prev, [activeProcessId]: newProcessSteps };
                });
            };

            const handleCalculate = () => {
                const currentProgress = completedSteps[activeProcessId] || [];
                if (currentProgress.length === activeProcess.steps.length) {
                    setShowResult(true);
                    setValidationError(false);
                } else {
                    setValidationError(true);
                    setShowResult(false);
                }
            };

            const handleClear = () => {
                if (activeProcessId) {
                    setCompletedSteps(prev => ({ ...prev, [activeProcessId]: [] }));
                    setShowResult(false);
                    setValidationError(false);
                    setActiveProcessId(null);
                }
            };

            // Componente de Cabecera (Se muestra en ambas vistas)
            const AppHeader = () => (
                <header className="flex flex-col-reverse md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-100 pb-6">
                    <div className="flex-1 text-left">
                        <h1 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight mb-2">
                            Manejo del sistema de filtración
                        </h1>
                        <p className="text-slate-600 text-sm md:text-base max-w-xl">
                            En esta aplicación podrás hacer una verificación paso a paso durante el manejo de válvulas en cada una de las funciones
                        </p>
                    </div>
                    <img 
                        src="https://i.postimg.cc/jdPC3FR0/logo-chemical.jpg" 
                        alt="Logo Chemical" 
                        className="h-14 md:h-20 w-auto object-contain shrink-0"
                    />
                </header>
            );

            // Componente Pie de página (Se muestra en ambas vistas)
            const AppFooter = () => (
                <footer className="mt-12 text-center border-t border-slate-200 pt-6 pb-4">
                    <p className="text-[11px] md:text-xs text-slate-500 max-w-3xl mx-auto leading-relaxed mb-3">
                        Propiedad de Chemical laboratorio (Classco, marca registrada) para el entrenamiento "operación y mantenimiento de piscinas" IQ Iván Pazos Guevara.
                    </p>
                    <div className="text-[11px] md:text-xs text-slate-600 flex flex-col md:flex-row justify-center items-center gap-2 md:gap-6">
                        <span className="flex items-center gap-1">
                            Contacto: 
                            <a href="https://wa.me/573164925462?text=Hola!%20Vengo%20de%20la%20calculadora%2C%20quiero%20saber%20m%C3%A1s%20sobre..." 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               className="font-semibold text-slate-800 hover:text-slate-500 transition-colors">
                                WhatsApp
                            </a>
                        </span>
                        <span className="hidden md:inline text-slate-300">•</span>
                        <span>Cali, Colombia.</span>
                        <span className="hidden md:inline text-slate-300">•</span>
                        <span className="flex items-center gap-1">
                            Página Web: 
                            <a href="http://www.chemical.com.co" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               className="font-semibold text-slate-800 hover:text-slate-500 transition-colors">
                                www.chemical.com.co
                            </a>
                        </span>
                        <span className="hidden md:inline text-slate-300">•</span>
                        <span className="flex items-center gap-1">
                            Catálogo: 
                            <a href="https://biocleaner.ecometri.shop/573007292928" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               className="font-semibold text-slate-800 hover:text-slate-500 transition-colors">
                                Tienda Online
                            </a>
                        </span>
                    </div>
                </footer>
            );

            // Vista 1: Selector de Procesos
            if (!activeProcessId) {
                return (
                    <div className="w-full flex flex-col animate-fade-in transition-all duration-300">
                        <AppHeader />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {PROCESSES.map((process) => {
                                const Icon = process.icon;
                                const stepsDone = completedSteps[process.id]?.length || 0;
                                const totalSteps = process.steps.length;
                                const isFinished = stepsDone === totalSteps;

                                return (
                                    <button
                                        key={process.id}
                                        onClick={() => handleSelectProcess(process.id)}
                                        className="flex flex-col text-left p-5 border border-slate-200 rounded-xl hover:border-slate-800 hover:shadow-sm active:scale-[0.98] transition-all duration-300 group bg-white"
                                    >
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="p-2 border border-slate-100 rounded-lg group-hover:bg-slate-800 group-hover:text-white text-slate-600 transition-colors">
                                                <Icon size={24} strokeWidth={1.5} />
                                            </div>
                                            <h2 className="font-semibold text-slate-800 text-sm md:text-base">
                                                {process.name}
                                            </h2>
                                        </div>
                                        
                                        <div className="mt-auto pt-3 border-t border-slate-50 flex items-center justify-between w-full">
                                            <span className="text-xs text-slate-500 font-medium">
                                                {totalSteps} pasos
                                            </span>
                                            {stepsDone > 0 && (
                                                <span className={`text-xs font-bold ${isFinished ? 'text-slate-800' : 'text-slate-400'}`}>
                                                    {stepsDone}/{totalSteps} completados
                                                </span>
                                            )}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                        <AppFooter />
                    </div>
                );
            }

            // Vista 2: Checklist del Proceso Seleccionado
            const currentProgress = completedSteps[activeProcessId] || [];

            return (
                <div className="w-full flex flex-col animate-fade-in transition-all duration-300">
                    <AppHeader />
                    
                    <div className="flex items-center gap-4 mb-6">
                        <button 
                            onClick={() => setActiveProcessId(null)}
                            className="flex items-center justify-center p-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors"
                            title="Volver"
                        >
                            <ArrowLeft size={20} className="text-slate-600" />
                        </button>
                        <h2 className="text-xl md:text-2xl font-bold text-slate-900">
                            {activeProcess.name}
                        </h2>
                    </div>

                    <div className="flex flex-col gap-3 mb-8">
                        {activeProcess.steps.map((step, index) => {
                            const isChecked = currentProgress.includes(index);
                            
                            return (
                                <button
                                    key={index}
                                    onClick={() => handleToggleStep(index)}
                                    className={`w-full text-left p-4 border rounded-xl flex items-start gap-4 transition-all duration-300 active:scale-[0.99] ${
                                        isChecked 
                                        ? 'border-slate-800 bg-slate-50/50' 
                                        : 'border-slate-200 hover:border-slate-400 shadow-sm bg-white'
                                    }`}
                                >
                                    <div className="mt-0.5 flex-shrink-0 transition-transform duration-300">
                                        {isChecked ? (
                                            <CheckCircle2 className="w-6 h-6 text-slate-800" strokeWidth={2} />
                                        ) : (
                                            <Circle className="w-6 h-6 text-slate-300" strokeWidth={1.5} />
                                        )}
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <p className={`text-sm md:text-base transition-all duration-300 ${
                                            isChecked ? 'text-slate-500 line-through' : 'text-slate-600 font-medium'
                                        }`}>
                                            {step.title}:
                                        </p>
                                        <p className={`text-base md:text-lg font-bold transition-all duration-300 ${
                                            isChecked ? 'text-slate-600' : 'text-slate-900'
                                        }`}>
                                            {step.value}
                                        </p>
                                    </div>
                                </button>
                            );
                        })}
                    </div>

                    {/* Alertas de Resultado y Validación */}
                    {validationError && (
                        <div className="mb-6 p-4 border border-red-200 bg-red-50 text-red-700 rounded-xl flex items-center gap-3 animate-fade-in">
                            <AlertCircle size={20} className="shrink-0" />
                            <p className="text-sm font-medium">Por favor, marca todos los pasos de la lista antes de verificar.</p>
                        </div>
                    )}

                    {showResult && (
                        <div className="mb-6 p-5 border-2 border-slate-800 rounded-xl flex items-center gap-3 animate-fade-in bg-white shadow-sm">
                            <div className="bg-slate-800 text-white p-2 rounded-full shrink-0">
                                <Check size={24} strokeWidth={2.5} />
                            </div>
                            <div>
                                <h3 className="font-bold text-slate-900">Proceso Verificado</h3>
                                <p className="text-sm text-slate-600">Todas las válvulas y el motor están en la posición correcta.</p>
                            </div>
                        </div>
                    )}

                    {/* Botones de Acción (Calcular / Limpiar) */}
                    <div className="flex flex-col sm:flex-row gap-3 mt-2">
                        <button 
                            onClick={handleCalculate}
                            className="flex-1 bg-slate-900 text-white py-4 px-6 rounded-xl font-semibold hover:bg-slate-800 active:scale-[0.98] transition-all shadow-sm flex items-center justify-center gap-2"
                        >
                            <CheckCircle2 size={20} />
                            Verificar Proceso
                        </button>
                        <button 
                            onClick={handleClear}
                            className="flex-1 bg-white border border-slate-200 text-slate-700 py-4 px-6 rounded-xl font-semibold hover:bg-slate-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                        >
                            <RefreshCw size={20} className="text-slate-400" />
                            Limpiar y Volver
                        </button>
                    </div>

                    <AppFooter />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
